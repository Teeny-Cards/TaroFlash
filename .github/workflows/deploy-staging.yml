name: Deploy to Staging

on:
  pull_request:
    types: [labeled, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  start:
    name: Post status comment
    if: contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      comment-id: ${{ steps.post.outputs.comment-id }}

    steps:
      - name: Find or create deploy comment
        id: post
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BODY="⏳ Staging deploy in progress from \`${SHA}\`..."

          COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | test("Staging deploy")) | .id' \
            | tail -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api \
              repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              --method PATCH \
              -f body="$BODY"
          else
            COMMENT_ID=$(gh api \
              repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              --method POST \
              --jq '.id' \
              -f body="$BODY")
          fi

          echo "comment-id=$COMMENT_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    needs: [start]
    if: contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    uses: ./.github/workflows/deploy.yml
    with:
      environment: staging
    secrets: inherit

  finish:
    name: Update status comment
    if: always() && contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    runs-on: ubuntu-latest
    needs: [start, deploy]
    permissions:
      pull-requests: write

    steps:
      - name: Update comment
        if: always()
        run: |
          RESULT="${{ needs.deploy.result }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "$RESULT" = "success" ]; then
            BODY="✅ Staging deploy complete from \`${SHA}\`."
          else
            BODY="❌ Staging deploy failed from \`${SHA}\` — [view logs](${RUN_URL})."
          fi

          gh api \
            repos/${{ github.repository }}/issues/comments/${{ needs.start.outputs.comment-id }} \
            --method PATCH \
            -f body="$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
