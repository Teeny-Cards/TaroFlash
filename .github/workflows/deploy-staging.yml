name: Deploy to Staging

on:
  pull_request:
    types: [labeled]

jobs:
  deploy:
    if: github.event.label.name == 'deploy:staging'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          supabase migration up \
            --project-ref ${{ secrets.STAGING_PROJECT_REF }} \
            --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Remove label
        if: always()
        continue-on-error: true
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label "deploy:staging"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "✅ Staging migrations applied from \`${{ github.sha }}\`."
          else
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "❌ Staging migration failed — [view logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
