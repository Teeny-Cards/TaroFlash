name: Deploy to Staging

on:
  pull_request:
    types: [labeled, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  start:
    name: Post status comment
    if: contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      comment-id: ${{ steps.post.outputs.comment-id }}

    steps:
      - name: Find or create deploy comment
        id: post
        run: |
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BODY="⏳ Staging deploy in progress from \`${SHA}\`..."

          COMMENT_ID=$(gh api \
            repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | test("Staging deploy")) | .id' \
            | tail -1)

          if [ -n "$COMMENT_ID" ]; then
            gh api \
              repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              --method PATCH \
              -f body="$BODY"
          else
            COMMENT_ID=$(gh api \
              repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
              --method POST \
              --jq '.id' \
              -f body="$BODY")
          fi

          echo "comment-id=$COMMENT_ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  migrate:
    name: DB migrations
    if: contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run migrations
        run: |
          supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }} --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
          supabase migration up --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  functions:
    name: Deploy edge functions
    needs: [migrate]
    if: contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ vars.SUPABASE_PROJECT_REF }} --password "${{ secrets.SUPABASE_DB_PASSWORD }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set edge function secrets
        run: |
          supabase secrets set \
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }} \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy functions
        run: supabase functions deploy --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  frontend:
    name: Build & deploy frontend
    needs: [migrate, functions]
    if: contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_API_KEY: ${{ secrets.VITE_SUPABASE_API_KEY }}
          VITE_STRIPE_PUBLIC_KEY: ${{ vars.VITE_STRIPE_PUBLIC_KEY }}
          VITE_MEMBERSHIP_PRICE_ID: ${{ vars.VITE_MEMBERSHIP_PRICE_ID }}
          VITE_AUTH_REDIRECT_URL: ${{ vars.VITE_AUTH_REDIRECT_URL }}

      - name: Deploy to Netlify
        run: pnpm --package=netlify-cli dlx netlify deploy --dir=dist --prod --no-build
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ vars.NETLIFY_SITE_ID }}

  finish:
    name: Update status comment
    if: always() && contains(github.event.pull_request.labels.*.name, 'deploy:staging')
    runs-on: ubuntu-latest
    needs: [start, migrate, functions, frontend]
    permissions:
      pull-requests: write

    steps:
      - name: Update comment
        if: always()
        run: |
          MIGRATE="${{ needs.migrate.result }}"
          FUNCTIONS="${{ needs.functions.result }}"
          FRONTEND="${{ needs.frontend.result }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          if [ "$MIGRATE" = "success" ] && [ "$FUNCTIONS" = "success" ] && [ "$FRONTEND" = "success" ]; then
            BODY="✅ Staging deploy complete from \`${SHA}\`."
          else
            BODY="❌ Staging deploy failed from \`${SHA}\` — [view logs](${RUN_URL})."
            [ "$MIGRATE"   != "success" ] && BODY="${BODY}
          - DB migrations: ${MIGRATE}"
            [ "$FUNCTIONS" != "success" ] && BODY="${BODY}
          - Edge functions: ${FUNCTIONS}"
            [ "$FRONTEND"  != "success" ] && BODY="${BODY}
          - Frontend: ${FRONTEND}"
          fi

          gh api \
            repos/${{ github.repository }}/issues/comments/${{ needs.start.outputs.comment-id }} \
            --method PATCH \
            -f body="$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
