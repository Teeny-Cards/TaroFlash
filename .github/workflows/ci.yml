name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      functions: ${{ steps.filter.outputs.functions }}
      db: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'tests/**'
              - 'types/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - '.oxlintrc*'
              - 'oxlint.json'
            functions:
              - 'supabase/functions/**'
            db:
              - 'supabase/migrations/**'
              - 'supabase/tests/**'
              - 'supabase/seed.sql'
              - 'supabase/config.toml'

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Run lint
        run: pnpm exec vp lint

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run tests
        run: pnpm exec vp test run --coverage --project Unit --project Integration

      - name: 'Report Coverage'
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          file-coverage-mode: 'all'

  test-functions:
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install function dependencies
        working-directory: supabase/functions
        run: deno install

      - name: Run edge function tests
        working-directory: supabase/functions
        run: deno test --allow-net --allow-env --allow-read

  test-db:
    needs: changes
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start -x realtime,storage-api,imgproxy,inbucket,postgrest-api,pgadmin-schema-diff,migra,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Run database tests
        run: supabase test db

  test-contract:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start -x realtime,imgproxy,inbucket,pgadmin-schema-diff,migra,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Export local Supabase keys
        run: |
          {
            echo "SUPABASE_URL=$(supabase status -o env | grep ^API_URL | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_ANON_KEY=$(supabase status -o env | grep ^ANON_KEY | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env | grep ^SERVICE_ROLE_KEY | cut -d= -f2- | tr -d '\"')"
          } >> "$GITHUB_ENV"

      - name: Run contract tests
        run: pnpm exec vp test run --project Contract
