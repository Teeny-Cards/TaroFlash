name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      functions: ${{ steps.filter.outputs.functions }}
      db: ${{ steps.filter.outputs.db }}
      contract: ${{ steps.filter.outputs.contract }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'tests/**'
              - 'types/**'
              - 'public/**'
              - 'index.html'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - 'vite.config.*'
              - 'vitest.config.*'
              - '.oxlintrc*'
              - 'oxlint.json'
            functions:
              - 'supabase/functions/**'
            db:
              - 'supabase/migrations/**'
              - 'supabase/tests/**'
              - 'supabase/seed.sql'
              - 'supabase/config.toml'
            contract:
              - 'src/api/**'
              - 'tests/contract/**'
              - 'tests/fixtures/**'
              - 'types/**'
              - 'supabase/migrations/**'
              - 'supabase/seed.sql'
              - 'supabase/config.toml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'vite.config.*'

  lint-and-test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Run lint
        run: pnpm exec vp lint

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Run tests
        run: pnpm exec vp test run --coverage --reporter=blob --reporter=default --project Unit --project Integration

      - name: Rename blob to avoid collision with contract blob
        run: mv .vitest-reports/blob.json .vitest-reports/blob-unit.json

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        with:
          name: blob-unit-integration
          path: .vitest-reports/
          retention-days: 30
          include-hidden-files: true

  test-functions:
    needs: changes
    if: needs.changes.outputs.functions == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install function dependencies
        working-directory: supabase/functions
        run: deno install

      - name: Run edge function tests
        working-directory: supabase/functions
        run: deno test --allow-net --allow-env --allow-read

  test-db:
    needs: changes
    if: needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start -x realtime,storage-api,imgproxy,inbucket,postgrest-api,pgadmin-schema-diff,migra,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Run database tests
        run: supabase test db

  test-contract:
    needs: changes
    if: needs.changes.outputs.contract == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start -x realtime,imgproxy,inbucket,pgadmin-schema-diff,migra,postgres-meta,studio,edge-runtime,logflare,vector,supavisor

      - name: Export local Supabase keys
        run: |
          {
            echo "SUPABASE_URL=$(supabase status -o env | grep ^API_URL | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_ANON_KEY=$(supabase status -o env | grep ^ANON_KEY | cut -d= -f2- | tr -d '\"')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(supabase status -o env | grep ^SERVICE_ROLE_KEY | cut -d= -f2- | tr -d '\"')"
          } >> "$GITHUB_ENV"

      - name: Run contract tests
        run: pnpm exec vp test run --coverage --reporter=blob --reporter=default --project Contract

      - name: Rename blob to avoid collision with unit blob
        run: mv .vitest-reports/blob.json .vitest-reports/blob-contract.json

      - name: Upload blob report
        uses: actions/upload-artifact@v4
        with:
          name: blob-contract
          path: .vitest-reports/
          retention-days: 30
          include-hidden-files: true

  coverage-report:
    needs: [changes, lint-and-test, test-contract]
    if: |
      always() &&
      needs.lint-and-test.result == 'success' &&
      (needs.test-contract.result == 'success' || needs.test-contract.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-node

      - name: Download unit/integration blob
        uses: actions/download-artifact@v4
        with:
          name: blob-unit-integration
          path: .vitest-reports/

      - name: Download contract blob (this run)
        if: needs.test-contract.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: blob-contract
          path: .vitest-reports/

      - name: Download contract blob (master fallback)
        if: needs.test-contract.result == 'skipped'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: ci.yml
          workflow_conclusion: success
          branch: master
          name: blob-contract
          path: .vitest-reports/
          if_no_artifact_found: warn

      # Master's contract blob carries stale v8 instrumentation for files
      # outside src/api/ (transitively imported during contract tests).
      # When merged against PR source where those files have changed line
      # numbers, v8 misaligns and reports drops on otherwise well-covered
      # files (e.g. src/sfx/*). Strip non-api entries so the fallback blob
      # contributes only its actual value: api coverage.
      - name: Strip non-api entries from stale contract blob
        if: needs.test-contract.result == 'skipped'
        run: |
          python3 - <<'PY'
          import json, pathlib
          path = pathlib.Path('.vitest-reports/blob-contract.json')
          if not path.exists():
              raise SystemExit(0)
          blob = json.loads(path.read_text())

          def is_strip(key: str) -> bool:
              return '/src/' in key and '/src/api/' not in key

          counter = [0]

          def visit(node):
              if isinstance(node, dict):
                  for k in list(node.keys()):
                      if isinstance(k, str) and is_strip(k):
                          del node[k]
                          counter[0] += 1
                      else:
                          visit(node[k])
              elif isinstance(node, list):
                  for item in node:
                      visit(item)

          visit(blob)
          path.write_text(json.dumps(blob))
          print(f'stripped {counter[0]} non-api file entries from stale contract blob')
          PY

      - name: Merge coverage
        id: merge
        continue-on-error: true
        run: pnpm exec vp test --merge-reports --coverage

      # Decouple baseline upload from merge step's exit code. `vp test
      # --merge-reports --coverage` occasionally exits non-zero after
      # successfully writing coverage-summary.json (e.g. Vue warns flipping
      # an internal error count, or mixed vitest+coverage-v8 versions). As
      # long as the summary file landed on disk we still want it published
      # as the master baseline so subsequent PR runs aren't comparing
      # against a stale snapshot.
      - name: Check merged summary present
        id: merged
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::error::Merge coverage did not produce coverage/coverage-summary.json"
            exit 1
          fi

      - name: Upload coverage summary (master baseline)
        if: |
          github.event_name == 'push' &&
          github.ref == 'refs/heads/master' &&
          steps.merged.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary-master
          path: coverage/coverage-summary.json
          retention-days: 30

      - name: Download master coverage summary (PR delta baseline)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: ci.yml
          workflow_conclusion: success
          branch: master
          name: coverage-summary-master
          path: coverage-base/
          if_no_artifact_found: warn

      - name: Check baseline summary present
        if: github.event_name == 'pull_request'
        id: baseline
        run: |
          if [ -f coverage-base/coverage-summary.json ]; then
            echo "path=coverage-base/coverage-summary.json" >> "$GITHUB_OUTPUT"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
          fi

      - name: Report Coverage
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          file-coverage-mode: 'all'
          json-summary-compare-path: ${{ steps.baseline.outputs.path }}
