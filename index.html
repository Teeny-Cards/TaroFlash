<!doctype html>
<html lang="en" class="h-full">
  <head>
    <title>TaroFlash</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" />
    <meta name="description" content="A Spaced Repetition Flashcard App" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" sizes="180x180" />
    <meta name="theme-color" content="#f3f1ea" />
    <meta name="google-site-verification" content="RYCZPlH19cDxgk_7N4FFqu8RVBS2CbUImLfmFFlFpL4" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tilt+Neon&display=swap" />
  </head>
  <body class="bg-brown-100 dark:bg-grey-900 h-full">
    <!-- Static Loader: paints the body to match the Vue loader's background so
         there's no flash on initial paint. Reads the stored theme preference from
         localStorage to pick the right color. Cleaned up by clearStaticLoader()
         in src/utils/static-loader.ts -->
    <script id="static-loader-script">
      ;(function () {
        var t = localStorage.getItem('app-theme')
        var d = t === 'dark' || (t !== 'light' && matchMedia('(prefers-color-scheme:dark)').matches)
        document.body.style.background = d ? '#1c1c1c' : '#11b7d4'
      })()
    </script>

    <div id="app" class="flex flex-col md:items-center h-full"></div>

    <section
      data-testid="app-modal-container"
      class="pointer-events-none touch-none fixed inset-0 z-100 flex items-center justify-center"
    ></section>
    <section
      toast-container
      class="pointer-events-none touch-none fixed inset-0 z-100 flex flex-col items-end gap-2 p-4 pt-16"
    ></section>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
